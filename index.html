<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Prague Half Marathon ГўВЂВ“ Pace Helper</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #f0f0f0;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 20px 16px env(safe-area-inset-bottom, 24px);
    max-width: 860px;
    margin: 0 auto;
  }

  /* ГўВ”ВЂГўВ”ВЂ HEADER ГўВ”ВЂГўВ”ВЂ */
  header { margin-bottom: 24px; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
  .subtitle { color: #555; font-size: 13px; margin-top: 4px; }

  /* ГўВ”ВЂГўВ”ВЂ CARDS ГўВ”ВЂГўВ”ВЂ */
  .card {
    background: #1a1d27;
    border: 1px solid #22253a;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 10px; font-weight: 700; color: #555;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* ГўВ”ВЂГўВ”ВЂ RUNNER ROWS ГўВ”ВЂГўВ”ВЂ */
  .runner-row {
    background: #12141f;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid transparent;
  }
  /* Top line: dot + name + remove */
  .runner-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .name-in {
    flex: 1; background: transparent; border: none; color: #f0f0f0;
    font-size: 15px; font-weight: 700; outline: none; min-width: 0;
  }
  .name-in::placeholder { color: #3a3a4a; }
  .rm-btn {
    background: none; border: none; color: #333;
    cursor: pointer; font-size: 22px; line-height: 1;
    padding: 0; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .rm-btn:active { color: #e63946; background: #1e0a0a; }
  /* Bottom line: pace + finish */
  .runner-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 18px; /* align under name, past the dot */
  }
  .pace-wrap {
    display: flex; align-items: center; gap: 5px;
    background: #0f1117; border-radius: 7px; padding: 5px 10px;
    flex-shrink: 0;
  }
  .pace-in {
    background: transparent; border: none; color: #f0f0f0;
    font-size: 15px; font-weight: 600; outline: none;
    width: 44px; text-align: center;
  }
  .pace-in::placeholder { color: #3a3a4a; }
  .pace-unit { color: #444; font-size: 11px; white-space: nowrap; }
  .finish-lbl {
    color: #555; font-size: 12px; flex: 1;
    text-align: right; white-space: nowrap;
  }

  #add-btn {
    width: 100%; background: none; border: 1px dashed #252837;
    border-radius: 10px; color: #444; padding: 10px; cursor: pointer;
    font-size: 13px; margin-top: 2px;
    -webkit-tap-highlight-color: transparent;
  }
  #add-btn:active { border-color: #3a3a52; color: #888; }

  /* ГўВ”ВЂГўВ”ВЂ CLOCK / SLIDER ГўВ”ВЂГўВ”ВЂ */
  #clock-lbl { font-size: 16px; font-weight: 700; color: #ddd; margin-bottom: 12px; }
  input[type=range] {
    width: 100%; accent-color: #e63946; cursor: pointer;
    height: 6px; border-radius: 3px;
    /* Bigger thumb for touch */
    -webkit-appearance: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #e63946;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #e63946;
    cursor: pointer;
    border: 2px solid #fff;
  }
  input[type=range]::-webkit-slider-runnable-track {
    background: #252837; border-radius: 3px; height: 6px;
  }
  .slider-ends {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #3a3a52; margin-top: 8px;
  }

  /* ГўВ”ВЂГўВ”ВЂ PLAY BUTTON ГўВ”ВЂГўВ”ВЂ */
  #play-btn {
    width: 100%; background: #e63946; border: none;
    border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700;
    padding: 14px; cursor: pointer; letter-spacing: 0.05em;
    margin-bottom: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  #play-btn:active { background: #c1121f; }

  /* ГўВ”ВЂГўВ”ВЂ TRACK ГўВ”ВЂГўВ”ВЂ */
  #track-wrap {
    position: relative;
    height: 68px;
  }
  .track-line {
    position: absolute;
    top: 26px; left: 20px; right: 20px;
    height: 3px; background: #252837; border-radius: 2px;
  }
  .km-tick {
    position: absolute; top: 20px;
    width: 1px; height: 12px; background: #2a2d3f;
    transform: translateX(-50%);
  }
  .km-lbl {
    position: absolute; top: 34px;
    font-size: 8px; color: #2e3148;
    transform: translateX(-50%); white-space: nowrap;
  }
  .km-cp {
    position: absolute; top: 18px;
    width: 2px; height: 16px; background: #383a55;
    transform: translateX(-50%);
  }
  .km-cp-lbl {
    position: absolute; top: 36px;
    font-size: 9px; color: #505470; font-weight: 700;
    transform: translateX(-50%); white-space: nowrap;
  }
  .rdot {
    position: absolute; top: 15px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2.5px solid #0f1117;
    transform: translateX(-50%);
    transition: left 0.12s ease-out;
  }
  .rdot-lbl {
    position: absolute; top: -20px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 1px 4px #0f1117, 0 0 8px #0f1117;
    pointer-events: none;
  }
  .finish-flag {
    position: absolute; top: 10px; right: 6px;
    font-size: 18px; line-height: 1;
  }

  /* ГўВ”ВЂГўВ”ВЂ CHECKPOINT TABLE ГўВ”ВЂГўВ”ВЂ */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 320px; }
  th {
    color: #444; padding: 5px 10px; text-align: center;
    border-bottom: 1px solid #1e2130;
    font-weight: 700; font-size: 10px; letter-spacing: 0.06em;
    white-space: nowrap;
  }
  th:first-child { text-align: left; min-width: 80px; }
  td { padding: 8px 10px; border-bottom: 1px solid #161820; text-align: center; color: #888; }
  td:first-child { text-align: left; color: #ccc; font-weight: 600; white-space: nowrap; }
  .ct { color: #e0e0e0; font-weight: 700; display: block; font-size: 13px; }
  .et { color: #444; font-size: 10px; }

  /* ГўВ”ВЂГўВ”ВЂ MOBILE TWEAKS ГўВ”ВЂГўВ”ВЂ */
  @media (max-width: 420px) {
    body { padding: 16px 12px env(safe-area-inset-bottom, 20px); }
    h1 { font-size: 20px; }
    .card { padding: 14px 12px; border-radius: 14px; }
    #clock-lbl { font-size: 14px; }
    .finish-lbl { display: none; }
  }

  /* ГўВ”ВЂГўВ”ВЂ DESKTOP REFINEMENTS ГўВ”ВЂГўВ”ВЂ */
  @media (min-width: 600px) {
    body { padding: 28px 24px 48px; }
    h1 { font-size: 28px; }
    .card { padding: 20px 22px; margin-bottom: 16px; }
    /* Restore single-line runner row on desktop */
    .runner-row { padding: 8px 12px; }
    .runner-top { margin-bottom: 0; }
    .runner-row { display: flex; align-items: center; flex-wrap: nowrap; gap: 0; }
    .runner-top { flex: 1; margin-bottom: 0; }
    .runner-bottom { flex-shrink: 0; padding-left: 0; }
    .finish-lbl { display: block; }
  }
</style>
</head>
<body>

<header>
  <h1>Г°ВџВЏВѓ Prague Half Marathon</h1>
  <div class="subtitle">Pace Helper &nbsp;Г‚В·&nbsp; 28 March 2026 &nbsp;Г‚В·&nbsp; Start 10:00</div>
</header>

<div class="card">
  <div class="card-title">Your Group</div>
  <div id="runners-list"></div>
  <button id="add-btn">+ Add runner</button>
</div>

<div class="card">
  <div id="clock-lbl">10:00 Г‚В· start</div>
  <input type="range" id="slider" min="0" max="180" step="0.25" value="0" />
  <div class="slider-ends"><span>10:00 start</span><span>finish ГўВ†В’</span></div>
</div>

<button id="play-btn">ГўВ–В¶ Play</button>

<div class="card" style="padding-bottom:20px">
  <div class="card-title">Race Track</div>
  <div id="track-wrap">
    <div class="track-line"></div>
    <span class="finish-flag">Г°ВџВЏВЃ</span>
  </div>
</div>

<div class="card">
  <div class="card-title">Checkpoint Times</div>
  <div class="table-scroll"><table id="cp-table"></table></div>
</div>

<script>
const RACE_KM = 21.0975;
const START_MIN = 600;
const CPS = [5, 10, 15, RACE_KM];
const CPL = ["5 km", "10 km", "15 km", "Finish Г°ВџВЏВЃ"];
const COLORS = ["#e63946","#2a9d8f","#e9c46a","#f4a261","#a8dadc","#6d6875","#b5838d","#48cae4","#52b788","#ff7b54"];

let runners = [
  { id: 1, name: "Anna",  pace: "5:00" },
  { id: 2, name: "Ben",   pace: "5:30" },
  { id: 3, name: "Clara", pace: "6:15" },
];
let nextId = 4, elapsed = 0, playing = false, rafId = null, lastTs = null;
const SPEED = 25;
const PAD_L = 20, PAD_R = 20;

function parsePace(s) {
  s = s.trim().replace(",", ".");
  if (s.includes(":")) {
    const [m, sec] = s.split(":").map(Number);
    return (isNaN(m) || isNaN(sec)) ? null : m + sec / 60;
  }
  const v = parseFloat(s);
  return isNaN(v) ? null : v;
}
function pad(n) { return String(Math.floor(n)).padStart(2, "0"); }
function fmtE(m) {
  const h = Math.floor(m / 60), mm = Math.floor(m % 60), s = Math.round((m * 60) % 60);
  return h > 0 ? `${h}:${pad(mm)}:${pad(s)}` : `${pad(mm)}:${pad(s)}`;
}
function clk(m) {
  const t = START_MIN + m;
  return `${pad(t / 60)}:${pad(t % 60)}`;
}
function maxT() {
  return Math.max(185, ...runners.map(r => {
    const p = parsePace(r.pace);
    return p ? Math.ceil(p * RACE_KM) + 5 : 185;
  }));
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let dotEls = {};

function buildTrack() {
  const wrap = document.getElementById("track-wrap");
  wrap.querySelectorAll(".km-tick,.km-lbl,.km-cp,.km-cp-lbl").forEach(e => e.remove());
  const tw = wrap.offsetWidth - PAD_L - PAD_R;
  // Decide label density based on width
  const labelEvery = tw < 260 ? 10 : 5;
  for (let km = 1; km <= 20; km++) {
    const x = PAD_L + (km / RACE_KM) * tw;
    const isCp = CPS.includes(km);
    const t = document.createElement("div");
    t.className = isCp ? "km-cp" : "km-tick";
    t.style.left = x + "px";
    wrap.appendChild(t);
    if (km % labelEvery === 0) {
      const l = document.createElement("div");
      l.className = isCp ? "km-cp-lbl" : "km-lbl";
      l.textContent = km;
      l.style.left = x + "px";
      wrap.appendChild(l);
    }
  }
}

function syncDots() {
  const wrap = document.getElementById("track-wrap");
  Object.keys(dotEls).forEach(id => {
    if (!runners.find(r => r.id == id)) { dotEls[id].remove(); delete dotEls[id]; }
  });
  runners.forEach(r => {
    if (!dotEls[r.id]) {
      const d = document.createElement("div");
      d.className = "rdot";
      const l = document.createElement("span");
      l.className = "rdot-lbl";
      d.appendChild(l);
      wrap.appendChild(d);
      dotEls[r.id] = d;
    }
  });
}

function moveDots() {
  const wrap = document.getElementById("track-wrap");
  const tw = wrap.offsetWidth - PAD_L - PAD_R;
  runners.forEach((r, i) => {
    const el = dotEls[r.id];
    if (!el) return;
    const c = COLORS[i % COLORS.length];
    const p = parsePace(r.pace);
    const km = p ? Math.min(elapsed / p, RACE_KM) : 0;
    const x = PAD_L + (km / RACE_KM) * tw;
    el.style.left = x + "px";
    el.style.background = c;
    el.style.boxShadow = `0 0 8px ${c}88`;
    el.querySelector(".rdot-lbl").textContent = r.name || "?";
    el.querySelector(".rdot-lbl").style.color = c;
  });
}

function renderList() {
  const list = document.getElementById("runners-list");
  list.innerHTML = "";
  runners.forEach((r, i) => {
    const c = COLORS[i % COLORS.length];
    const p = parsePace(r.pace);
    const f = p ? p * RACE_KM : null;
    const row = document.createElement("div");
    row.className = "runner-row";
    row.style.borderColor = c + "55";
    row.innerHTML = `
      <div class="runner-top">
        <div class="dot" style="background:${c}"></div>
        <input class="name-in" type="text" value="${esc(r.name)}" placeholder="Name"
               data-id="${r.id}" data-f="name" autocomplete="off" />
        <button class="rm-btn" data-id="${r.id}" aria-label="Remove">ГѓВ—</button>
      </div>
      <div class="runner-bottom">
        <div class="pace-wrap">
          <input class="pace-in" type="text" inputmode="decimal" value="${esc(r.pace)}"
                 placeholder="5:30" data-id="${r.id}" data-f="pace" autocomplete="off" />
          <span class="pace-unit">min/km</span>
        </div>
        <div class="finish-lbl">${f ? "~" + fmtE(f) + " finish" : '<span style="color:#2a2a3a">invalid</span>'}</div>
      </div>`;
    list.appendChild(row);
  });
  list.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("input", e => {
      const id = +e.target.dataset.id, f = e.target.dataset.f;
      runners = runners.map(r => r.id === id ? { ...r, [f]: e.target.value } : r);
      renderAll();
    });
  });
  list.querySelectorAll(".rm-btn").forEach(b => {
    b.addEventListener("click", e => {
      runners = runners.filter(r => r.id !== +e.target.dataset.id);
      renderAll();
    });
  });
}

function renderSlider() {
  const sl = document.getElementById("slider");
  sl.max = maxT();
  sl.value = elapsed;
  document.getElementById("clock-lbl").textContent =
    `${clk(elapsed)}  Г‚В·  elapsed ${fmtE(elapsed)}`;
}

function renderTable() {
  let h = `<thead><tr><th>Runner</th>${CPL.map(l => `<th>${l}</th>`).join("")}</tr></thead><tbody>`;
  runners.forEach((r, i) => {
    const p = parsePace(r.pace), c = COLORS[i % COLORS.length];
    h += `<tr><td><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c};margin-right:7px;vertical-align:middle"></span>${esc(r.name)}</td>
      ${CPS.map(km => {
        const m = p ? p * km : null;
        return `<td>${m ? `<span class="ct">${clk(m)}</span><span class="et">${fmtE(m)}</span>` : "ГўВЂВ”"}</td>`;
      }).join("")}</tr>`;
  });
  h += "</tbody>";
  document.getElementById("cp-table").innerHTML = h;
}

function renderAll() {
  renderList();
  renderSlider();
  syncDots();
  moveDots();
  renderTable();
}

document.getElementById("add-btn").addEventListener("click", () => {
  runners.push({ id: nextId, name: "Runner " + nextId, pace: "6:00" });
  nextId++;
  renderAll();
});
document.getElementById("slider").addEventListener("input", e => {
  elapsed = +e.target.value; renderAll();
});
document.getElementById("play-btn").addEventListener("click", () => {
  playing = !playing;
  document.getElementById("play-btn").textContent = playing ? "ГўВЏВё Pause" : "ГўВ–В¶ Play";
  if (playing) { lastTs = null; rafId = requestAnimationFrame(anim); }
  else if (rafId) cancelAnimationFrame(rafId);
});
function anim(ts) {
  if (!playing) return;
  if (lastTs !== null) {
    elapsed += ((ts - lastTs) / 1000) * SPEED;
    const mx = maxT();
    if (elapsed >= mx) {
      elapsed = mx; playing = false;
      document.getElementById("play-btn").textContent = "ГўВ–В¶ Play";
      renderAll(); return;
    }
    renderAll();
  }
  lastTs = ts;
  rafId = requestAnimationFrame(anim);
}

let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { buildTrack(); moveDots(); }, 100);
});

buildTrack();
renderAll();
</script>
</body>
</html>
